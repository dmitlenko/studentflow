{% extends 'index.html' %} {% block content %}

{% load crispy_forms_tags %}
<div class="row justify-content-md-center">
    <div class="card col-md-5">
        <div class="card-body">
            <h5 class="card-title">Sign into your account</h5>
            <form action="" method="post">
                {% csrf_token %} {{ form|crispy }}
                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-box-arrow-in-right"></i> Log in</button>
            </form>
            <span>Don't have an account? <a href="{% url 'signup' %}">Register here</a> </span> 
        </div>
    </div>
</div>
{% endblock %}
