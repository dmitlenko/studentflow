{% load static %}
{% load base_tags %}
<div class="col{{prefix}}">
    <div class="card" id="post_{{post.id}}">
        {% if post.image %}
        <img src="{% get_media_prefix %}{{ post.image }}" class="card-img-top" alt="{{post.title}} thumbnail"
            style="height: 260px; object-fit: cover;" />
        {% endif %}
        <div class="card-body">
            <h5 class="card-title">{{post.title}}
                {% if post.author == request.use %}
                <a href="{% url 'update_post' pk=post.id %}">
                    <span class="fs-6 text">
                        <i class="bi bi-pencil-fill"></i>
                        Edit
                    </span>
                </a>
                {% endif %}
            </h5>
            <span>by <a href="{% url 'profile' pk=post.author.id %}"
                    class="card-title">@{{post.author.username}}</a></span>
            <p class="card-text">
                {{post.body|truncatechars:50 }}
            </p>
            <div class="input-group d-flex">
                <a href="{% if post|is_liked:request.user %}{% url 'unlike_post' pk=post.id %}{% else %}{% url 'like_post' pk=post.id %}{% endif %}"
                    class="btn btn-danger flex-shrink-0">
                    <i class="bi bi-heart"></i>
                    {% firstof post.likes.count %}
                </a>
                <a href="{% url 'detail_post' pk=post.id %}" class="btn btn-primary flex-grow-1">
                    <i class="bi bi-book-half"></i>
                    Read
                </a>
                <a href="#" class="btn btn-primary flex-shrink-0">
                    <i class="bi bi-eye"></i>
                    {{ post.views.count }}
                </a>
                <a href="{% url 'detail_post' pk=post.id %}#comments" class="btn btn-primary flex-shrink-0">
                    <i class="bi bi-chat-left-text"></i>
                    {{ post.postcomment_set.all.count }}
                </a>
            </div>
        </div>
    </div>
</div>
