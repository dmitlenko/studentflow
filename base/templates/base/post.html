{% extends 'index.html' %} {% block content %}
{% load static %}

{% load crispy_forms_tags %}
<div class="card">
    {% if object.image %}
    <img src="{% get_media_prefix %}{{ object.image }}" class="card-img-top" alt="...">
    {% endif %}

    <div class="card-body">
        <h5 class="card-title">{{object.title}}</h5>
        <div class="card-body">
            <a href="#">@{{object.author.username}}</a> on {{object.date_edited|date}}
            {% if object.author == request.user %}
            <a href="{% url 'update_post' pk=object.id %}">Edit</a>
            <a href="{% url 'delete_post' pk=object.id %}">Delete</a>
            {% endif %}
            <div class="card-text" style="white-space: pre-line;">
                {{object.body}}
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
