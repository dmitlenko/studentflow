{% extends 'index.html' %} {% block content %}
{% load static %}

{% load crispy_forms_tags %}
<div class="card">
    {% if object.image %}
    <img src="{% get_media_prefix %}{{ object.image }}" class="card-img-top" alt="...">
    {% endif %}
    
    <div class="card-body">
        <h5 class="card-title">{{object.title}}</h5>
        <div>
            <a href="#">@{{object.author}}</a> on {{object.date_edited|date}}
        </div>
        <p class="card-text text-justify">
            {{object.body}}
        </p>
    </div>
</div>
{% endblock %}
