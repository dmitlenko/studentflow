{% extends 'index.html' %} {% block content %} 

<div class="row justify-content-md-center">
{% for post in posts %}
    <div class="col-md-3">
        <div class="card">
            <!-- <img src="..." class="card-img-top" alt="..." /> -->
            <div class="card-body">
                <h5 class="card-title">{{post.title}}</h5>
                <p class="card-text">
                    {{post.body|slice:':50'}}
                </p>
                <a href="{% url 'detail_post' pk=post.id %}" class="btn btn-primary">Read</a>
            </div>
        </div>
    </div>
{% endfor %} 
</div>

{% endblock %}
